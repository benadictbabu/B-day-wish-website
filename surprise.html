<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    if (!window.location.search.includes('auth=true')) {
        window.location.href = 'index.html';
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B'day Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; 
            position: relative;
        }

        #fireworksCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; 
        }

        /* 🎂 PREMIUM CAKE STRUCTURE (SEAMLESS) */
        .cake-container {
            position: relative;
            width: 260px;
            height: 140px;
            margin-top: 100px;
            z-index: 10;
        }

        /* 1. LEFT CAKE (Stays perfectly intact) */
        .tier-bottom-left {
            position: absolute; bottom: 0; left: 0;
            width: 180px; height: 80px;
            background: #ff6b8b; /* Solid color for seamless blend */
            border-radius: 12px 0 0 12px;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.15); /* Bottom shadow only */
        }
        .tier-top-left {
            position: absolute; bottom: 80px; left: 30px;
            width: 150px; height: 60px;
            background: #ff9a9e; 
            border-radius: 12px 0 0 0;
            box-shadow: inset 0 -8px 10px rgba(0,0,0,0.1);
        }

        /* 2. INNER SPONGE (Revealed when slice moves) */
        .sponge-bottom {
            position: absolute; bottom: 0; left: 180px;
            width: 80px; height: 80px;
            background-color: #c0392b;
            background-image: radial-gradient(#922b21 2px, transparent 2px);
            background-size: 12px 12px;
            border-radius: 0 12px 12px 0;
            border-left: 2px solid rgba(0,0,0,0.4);
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.6);
        }
        .sponge-top {
            position: absolute; bottom: 80px; left: 180px;
            width: 40px; height: 60px;
            background-color: #d24d57;
            background-image: radial-gradient(#a22b34 2px, transparent 2px);
            background-size: 12px 12px;
            border-radius: 0 12px 0 0;
            border-left: 2px solid rgba(0,0,0,0.4);
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.5);
        }

        /* 3. THE SLICE (Overlaps exactly to hide the seam) */
        .cake-slice {
            position: absolute; top: 0; left: 179px; /* 1px overlap */
            width: 81px; height: 100%;
            z-index: 5;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cake-slice.cut {
            /* Moves the slice away revealing sponge */
            transform: translate(50px, 15px) rotate(8deg);
        }

        .tier-bottom-slice {
            position: absolute; bottom: 0; left: 0;
            width: 81px; height: 80px;
            background: #ff6b8b; /* Exactly same as left cake */
            border-radius: 0 12px 12px 0;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.15);
        }
        .tier-top-slice {
            position: absolute; bottom: 80px; left: 0;
            width: 41px; height: 60px;
            background: #ff9a9e; /* Exactly same as top left */
            border-radius: 0 12px 12px 0;
            box-shadow: inset 0 -8px 10px rgba(0,0,0,0.1);
        }

        /* BEAUTIFUL ICING (Seamless) */
        .icing {
            position: absolute; top: 0; left: 0; width: 100%; height: 25px; background: #fff;
        }
        .tier-bottom-left .icing { border-radius: 12px 0 0 0; }
        .tier-bottom-slice .icing { border-radius: 0 12px 0 0; }
        .tier-top-left .icing { border-radius: 12px 0 0 0; }
        .tier-top-slice .icing { border-radius: 0 12px 0 0; }

        /* Icing Drips */
        .tier-bottom-left .icing::after {
            content: ''; position: absolute; top: 10px; left: 15px; width: 25px; height: 25px;
            background: #fff; border-radius: 50%;
            box-shadow: 35px 5px 0 0 #fff, 75px 12px 0 0 #fff, 115px 4px 0 0 #fff, 145px 8px 0 0 #fff;
        }
        .tier-bottom-slice .icing::after {
            content: ''; position: absolute; top: 10px; left: 15px; width: 25px; height: 25px;
            background: #fff; border-radius: 50%;
            box-shadow: 35px 8px 0 0 #fff;
        }
        .tier-top-left .icing::after {
            content: ''; position: absolute; top: 10px; left: 15px; width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            box-shadow: 30px 8px 0 0 #fff, 65px 4px 0 0 #fff, 95px 10px 0 0 #fff;
        }
        .tier-top-slice .icing::after {
            content: ''; position: absolute; top: 10px; left: 5px; width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
        }

        /* 🕯️ CANDLES */
        .candle {
            position: absolute; bottom: 140px; 
            width: 14px; height: 45px;
            background: repeating-linear-gradient(45deg, #ffeaa7, #ffeaa7 5px, #fdcb6e 5px, #fdcb6e 10px);
            border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        /* Left cake candles */
        .c1 { left: 50px; }
        .c2 { left: 110px; }
        /* Slice candle (Position is relative to the slice container now) */
        .c3 { left: 11px; } 

        /* Smooth Flame Wrapper */
        .flame-wrapper {
            position: absolute; top: -25px; left: 0; width: 14px; height: 25px;
            transition: transform 3.5s ease-in, opacity 3.5s ease-in; 
            transform-origin: bottom center;
        }
        .flame {
            width: 100%; height: 100%; background: #ff9f43;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 15px #ff9f43, 0 0 25px #feca57;
            animation: flicker 0.4s infinite alternate;
        }
        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); }
            100% { transform: scale(1.1) rotate(2deg); opacity: 0.9; }
        }
        .extinguished {
            opacity: 0 !important; transform: scale(0) translateY(-20px) !important; 
        }

        /* 🌬️ BLOW BUTTON */
        #blowBtn {
            margin-top: 60px;
            background: linear-gradient(45deg, #00C9FF, #92FE9D);
            color: #121212; border: none; padding: 12px 35px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(0, 201, 255, 0.4);
            transition: 0.3s; z-index: 20;
        }
        #blowBtn:hover { transform: scale(1.05); }

        #hintText {
            margin-top: 20px; color: #00C9FF; font-size: 18px; font-weight: 600;
            display: none; z-index: 20; animation: fadeIn 0.5s;
        }

        /* 🔪 KNIFE */
        #knife {
            position: absolute; top: 20%; right: 5%; 
            font-size: 110px; cursor: grab; display: none; z-index: 50;
            user-select: none; touch-action: none; 
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #knife:active { cursor: grabbing; transform: scale(1.1) rotate(-15deg); }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Surprise Message */
        #hiddenSurprise {
            position: absolute; top: 8%; font-size: 45px; color: #FFD700;
            text-align: center; font-weight: 800; text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            opacity: 0; transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 15; pointer-events: none;
        }
        #hiddenSurprise.show { opacity: 1; transform: scale(1); }

        /* 🎈 BALLOONS */
        .balloon {
            position: absolute; bottom: -150px; width: 45px; height: 60px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; 
            opacity: 0.95; animation: floatUp linear forwards; z-index: 5;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.15); 
        }
        .balloon::before {
            content: ''; position: absolute; bottom: -6px; left: 18px;
            border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 8px solid;
            border-bottom-color: inherit;
        }
        .balloon::after {
            content: ''; position: absolute; bottom: -50px; left: 22px;
            width: 1px; height: 50px; background: rgba(255,255,255,0.4);
        }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-130vh) rotate(15deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* New Button Style */
        #moreBtn {
            position: absolute;
            bottom: 40px;
            background: linear-gradient(45deg, #ff00cc, #333399);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 204, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease, transform 0.3s;
            z-index: 100;
        }
        #moreBtn:hover { transform: scale(1.05); }
        #moreBtn.show-btn { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div id="hiddenSurprise">🎉 Happy Birthday "Friend's name"!! 🎉<br><span style="font-size: 20px; color: white; text-shadow: none;">"single line description ❤️"</span></div>

    <div class="cake-container" id="cakeBox">
        
        <div class="tier-bottom-left"><div class="icing"></div></div>
        <div class="tier-top-left"><div class="icing"></div></div>
        <div class="candle c1"><div class="flame-wrapper"><div class="flame"></div></div></div>
        <div class="candle c2"><div class="flame-wrapper"><div class="flame"></div></div></div>

        <div class="sponge-bottom"></div>
        <div class="sponge-top"></div>

        <div class="cake-slice" id="cakeSlice">
            <div class="tier-bottom-slice"><div class="icing"></div></div>
            <div class="tier-top-slice"><div class="icing"></div></div>
            <div class="candle c3"><div class="flame-wrapper"><div class="flame"></div></div></div>
        </div>

    </div>

    <button id="blowBtn">Blow Candles</button>
    <div id="hintText">Drag the knife to cut your B'day cake!</div>

    <div id="knife">🔪</div>

    <button id="moreBtn">Get more surprises ✨</button>

    <script>
        const moreBtn = document.getElementById('moreBtn');
        const blowBtn = document.getElementById('blowBtn');
        const flameWrappers = document.querySelectorAll('.flame-wrapper');
        const knife = document.getElementById('knife');
        const hintText = document.getElementById('hintText');
        const cakeSlice = document.getElementById('cakeSlice');
        const cakeBox = document.getElementById('cakeBox');
        const hiddenSurprise = document.getElementById('hiddenSurprise');

        let isBlown = false;
        let isCut = false;

        // 1. Smooth Blow Action
        blowBtn.addEventListener('click', () => {
            if(isBlown) return;
            isBlown = true;
            
            flameWrappers.forEach(wrapper => {
                wrapper.classList.add('extinguished');
            });
            
            blowBtn.style.display = 'none';

            setTimeout(() => {
                knife.style.display = 'block';
                hintText.style.display = 'block';
            }, 1000);
        });

        // 2. Smooth Drag Logic
        let isDragging = false;
        let offsetX, offsetY;

        const startDrag = (e) => {
            if(!isBlown || isCut) return;
            isDragging = true;
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            let rect = knife.getBoundingClientRect();
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
        };

        const moveDrag = (e) => {
            if(!isDragging) return;
            e.preventDefault(); 
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            knife.style.left = (clientX - offsetX) + 'px';
            knife.style.top = (clientY - offsetY) + 'px';

            let cakeRect = cakeBox.getBoundingClientRect();
            if (clientX > cakeRect.left && clientX < cakeRect.right &&
                clientY > cakeRect.top && clientY < cakeRect.bottom) {
                if(!isCut) cutCake();
            }
        };

        const endDrag = () => { isDragging = false; };

        knife.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('mouseup', endDrag);
        knife.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', moveDrag, {passive: false});
        document.addEventListener('touchend', endDrag);

        // 3. Perfect Slice Action
        function cutCake() {
            isCut = true;
            isDragging = false; 
            
            knife.style.transition = 'opacity 0.2s ease';
            knife.style.opacity = '0'; 
            setTimeout(() => knife.style.display = 'none', 200);
            hintText.style.display = 'none';

            cakeSlice.classList.add('cut');
            hiddenSurprise.classList.add('show');
            
            startBalloons();
            
            setTimeout(() => {
                startFireworks();
            }, 1500);
            // 4 Second timer for the next button
            setTimeout(() => {
                moreBtn.classList.add('show-btn');
            }, 6000);
        }

        // 4. Massive Balloons
        function startBalloons() {
            for(let i=0; i<60; i++) {
                setTimeout(createBalloon, i * 40);
            }
            setInterval(createBalloon, 350); 
        }

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fd79a8', '#00C9FF'];
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.borderBottomColor = balloon.style.backgroundColor;
            balloon.style.left = Math.random() * 95 + 'vw';
            balloon.style.animationDuration = (Math.random() * 3 + 4) + 's'; 
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 7000);
        }

        // 5. Realistic Sky Shots
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let fireworksActive = false;

        function startFireworks() {
            fireworksActive = true;
            launchSkyShot();
            setInterval(launchSkyShot, 800);
            loopFireworks();
        }

        function launchSkyShot() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height / 2.5); 
            const colors = ['#00C9FF', '#92FE9D', '#FFD700', '#FF9A9E', '#ff7675', '#ffffff'];
            const color = colors[Math.floor(Math.random() * colors.length)];

            for (let i = 0; i < 90; i++) { 
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2; 
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, 
                    alpha: 1, color: color,
                    size: Math.random() * 3 + 1,
                    decay: Math.random() * 0.015 + 0.005 
                });
            }
        }

        function loopFireworks() {
            if(!fireworksActive) return;
            requestAnimationFrame(loopFireworks);
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.vx *= 0.96; p.vy *= 0.96; p.alpha -= p.decay; 
                ctx.globalAlpha = p.alpha > 0 ? p.alpha : 0;
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                if (p.alpha <= 0) { particles.splice(i, 1); i--; }
            }
            ctx.globalAlpha = 1;
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        moreBtn.addEventListener('click', () => {
    window.location.href = "letters.html?auth=true"; 
});
    </script>
</body>
</html>
