<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B'day Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 60px;
            max-width: 1100px;
            width: 100%;
        }

        .text-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.15); /* Light border */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 500px;
        }

        .text-box p {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .highlight-text {
            color: #ff9a9e; 
            font-weight: 600;
        }

        /* Button Styling */
        #giftBtn {
            background: linear-gradient(45deg, #ff00cc, #333399);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 204, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
            width: 100%; 
        }

        #giftBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 0, 204, 0.7); 
        }

        /* Right Side: Image Styling */
        .img-box {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        @keyframes floatingEffect {
            0% { transform: translate(0px, 0px) rotate(2deg); }
            25% { transform: translate(-8px, -12px) rotate(0deg); }
            50% { transform: translate(5px, -15px) rotate(-2deg); }
            75% { transform: translate(10px, -5px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(2deg); }
        }

        .img-box {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .img-box img {
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.1);
            animation: floatingEffect 6s ease-in-out infinite; 
        }

        .img-box img:hover {
            transform: scale(1.05);
            animation-play-state: paused; 
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse; 
                gap: 30px;
                text-align: center;
            }
            .text-box {
                padding: 30px 20px;
            }
            .img-box img {
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="text-box">
            <p>
                This was actually a <span class="highlight-text">B'day Surprise</span> for my bestfriend who was shown on the right side 🫣😝👉🏻.
            </p>
            <p>
                Click on the button below and go on... Exciting surprises are waiting for you 😌😌
            </p>
            
            <button id="giftBtn">Unlock My Surprises</button>
        </div>

        <!-- Right Side: Friend's Image -->
        <div class="img-box">
            <img src="img6.jpeg" alt="Birthday person's photo">
        </div>

    </div>

    <script>
        const btn = document.getElementById('giftBtn');

        btn.addEventListener('click', function() {
            window.location.href = "questions.html?auth=true"; 
        });
    </script>

</body>
</html>
